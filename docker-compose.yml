version: "3.9"

services:
  # ---- MySQL 数据库 ----
  mysql:
    image: mysql:8.0
    container_name: railway-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: railway_booking
    ports:
      - "3306:3306"
    volumes:
      # 数据库文件持久化（容器删掉后数据不丢）
      - mysql-data:/var/lib/mysql
      # 按顺序执行建表和数据初始化（docker-entrypoint 会按文件名排序执行）
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/main/resources/demo-data.sql:/docker-entrypoint-initdb.d/02-demo-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---- Redis 缓存 ----
  redis:
    image: redis:7-alpine
    container_name: railway-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis-data:/data

  # ---- Spring Boot 后端 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: railway-backend
    environment:
      DB_HOST: ${DB_HOST:-mysql}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      REDIS_HOST: ${REDIS_HOST:-redis}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ---- Vue 前端（Nginx） ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: railway-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

# 数据卷
volumes:
  mysql-data:
  redis-data:

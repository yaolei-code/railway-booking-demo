<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>选课结果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#6366F1',
                        success: '#10B981',
                        danger: '#EF4444',
                        neutral: '#F3F4F6',
                        dark: '#1F2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .animate-fade-in {
                animation: fadeIn 0.5s ease-in-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
<!-- 导航栏 -->
<nav class="bg-white shadow-md sticky top-0 z-50 transition-all duration-300">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fa fa-graduation-cap text-primary text-2xl"></i>
            <span class="text-xl font-bold text-dark">学生选课系统</span>
        </div>
        <div class="flex items-center space-x-4">
            <a href="#" th:href="@{/index(sid=${sid})}" class="text-gray-600 hover:text-primary transition-colors duration-300 flex items-center">
                <i class="fa fa-home mr-1"></i>
                <span>首页</span>
            </a>
            <div class="h-8 w-8 rounded-full bg-primary/10 flex items-center justify-center">
                <i class="fa fa-user text-primary"></i>
            </div>
        </div>
    </div>
</nav>

<!-- 主要内容区 -->
<main class="container mx-auto px-4 py-8">
    <!-- 标题区域 -->
    <div class="mb-8 text-center animate-fade-in">
        <h1 class="text-[clamp(1.8rem,3vw,2.5rem)] font-bold text-dark mb-2">选课结果</h1>
        <p class="text-gray-600 max-w-2xl mx-auto">
            以下是您的选课操作结果
        </p>
    </div>

    <!-- 结果卡片 -->
    <div class="bg-white rounded-xl shadow-lg p-6 mb-8 animate-fade-in"
         th:class="${msg == '选课成功！' ? 'border-l-4 border-success' : 'border-l-4 border-danger'}">
        <div class="flex items-start">
            <div class="flex-shrink-0"
                 th:class="${msg == '选课成功！' ? 'text-success' : 'text-danger'}">
                <i class="fa" th:class="${msg == '选课成功！' ? 'fa-check-circle text-3xl' : 'fa-times-circle text-3xl'}"></i>
            </div>
            <div class="ml-4">
                <h3 class="text-xl font-semibold text-dark"
                    th:text="${msg == '选课成功！' ? '选课成功' : '选课失败'}">结果标题</h3>
                <div class="mt-2 text-gray-700">
                    <p th:text="${msg}">提示信息</p>
                </div>

                <!-- 只有在选课成功时才展示课程详细信息 -->
                <div th:if="${msg == '选课成功！'}" class="mt-4 bg-gray-50 p-4 rounded-lg">
                    <p class="text-gray-600 mb-2">你已成功选修：</p>
                    <ul class="space-y-2">
                        <li class="flex">
                            <span class="text-gray-500 w-24">课程编号：</span>
                            <span class="font-medium" th:text="${cid}">课程编号</span>
                        </li>
                        <li class="flex">
                            <span class="text-gray-500 w-24">课程名称：</span>
                            <span class="font-medium" th:text="${cname}">课程名称</span>
                        </li>
                        <li class="flex">
                            <span class="text-gray-500 w-24">学期：</span>
                            <span class="font-medium" th:text="${semester}">学期</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- 按钮区域 -->
    <div class="flex flex-col sm:flex-row justify-center space-y-4 sm:space-y-0 sm:space-x-4 animate-fade-in">
        <!-- 🔁 返回课程列表按钮 -->
        <form th:action="@{/coursesPage}" method="get" class="w-full sm:w-auto">
            <input type="hidden" name="sid" th:value="${sid}" />
            <button type="submit" class="w-full sm:w-auto bg-gray-200 hover:bg-gray-300 text-dark px-6 py-3 rounded-lg transition-all duration-300 flex items-center justify-center mx-auto shadow hover:shadow-md">
                <i class="fa fa-arrow-left mr-2"></i>
                <span>返回课程列表</span>
            </button>
        </form>

        <!-- ✅ 新增：跳转“查看我的课程”按钮 -->
        <form th:action="@{/myCourses}" method="get" class="w-full sm:w-auto">
            <input type="hidden" name="sid" th:value="${sid}" />
            <button type="submit" class="w-full sm:w-auto bg-primary hover:bg-primary/90 text-white px-6 py-3 rounded-lg transition-all duration-300 flex items-center justify-center mx-auto shadow-md hover:shadow-lg">
                <i class="fa fa-bookmark-o mr-2"></i>
                <span>查看我的课程</span>
            </button>
        </form>
    </div>
</main>

<!-- 页脚 -->
<footer class="bg-dark text-white py-8 mt-12">
    <div class="container mx-auto px-4">
        <div class="flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0">
                <div class="flex items-center space-x-2">
                    <i class="fa fa-graduation-cap text-primary text-2xl"></i>
                    <span class="text-xl font-bold">学生选课系统</span>
                </div>
                <p class="text-gray-400 mt-2">为学生提供便捷的选课和成绩查询服务</p>
            </div>
            <div class="flex space-x-6">
                <a href="#" class="text-gray-400 hover:text-white transition-colors duration-300">
                    <i class="fa fa-question-circle"></i>
                    <span class="ml-1">帮助中心</span>
                </a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors duration-300">
                    <i class="fa fa-envelope"></i>
                    <span class="ml-1">联系我们</span>
                </a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors duration-300">
                    <i class="fa fa-shield"></i>
                    <span class="ml-1">隐私政策</span>
                </a>
            </div>
        </div>
        <div class="border-t border-gray-700 mt-6 pt-6 text-center text-gray-400 text-sm">
            <p>© 2025 高校学生选课管理系统. 保留所有权利.</p>
        </div>
    </div>
</footer>

<script>
    // 页面滚动时导航栏样式变化
    window.addEventListener('scroll', function() {
        const nav = document.querySelector('nav');
        if (window.scrollY > 10) {
            nav.classList.add('py-2', 'shadow-lg');
            nav.classList.remove('py-3', 'shadow-md');
        } else {
            nav.classList.add('py-3', 'shadow-md');
            nav.classList.remove('py-2', 'shadow-lg');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的成绩</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#6366F1',
                        success: '#10B981',
                        danger: '#EF4444',
                        neutral: '#F3F4F6',
                        dark: '#1F2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
            .hover-scale {
                transition: transform 0.3s ease;
            }
            .hover-scale:hover {
                transform: scale(1.02);
            }
            .animate-fade-in {
                animation: fadeIn 0.5s ease-in-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
<!-- 导航栏 -->
<nav class="bg-white shadow-md sticky top-0 z-50 transition-all duration-300">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fa fa-graduation-cap text-primary text-2xl"></i>
            <span class="text-xl font-bold text-dark">学生成绩系统</span>
        </div>
        <div>
            <button type="button" class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg transition-all duration-300 flex items-center shadow-md hover:shadow-lg">
                <i class="fa fa-home mr-2"></i>
                <span>首页</span>
            </button>
        </div>
    </div>
</nav>

<!-- 主要内容区 -->
<main class="container mx-auto px-4 py-8">
    <!-- 标题区域 -->
    <div class="mb-8 text-center animate-fade-in">
        <h1 class="text-[clamp(1.8rem,3vw,2.5rem)] font-bold text-dark mb-2">课程成绩一览</h1>
        <p class="text-gray-600 max-w-2xl mx-auto">查看你本学期的所有课程成绩，点击返回按钮可回到主页面</p>
    </div>

    <!-- 成绩卡片 -->
    <div class="bg-white rounded-xl shadow-lg p-6 mb-8 animate-fade-in">
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-6">
            <div class="mb-4 md:mb-0">
                <h2 class="text-xl font-semibold text-dark">课程成绩详情</h2>
                <p class="text-gray-500">以下是你当前学期的课程成绩</p>
            </div>
            <div class="flex space-x-3">
                <button class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg transition-all duration-300 flex items-center shadow hover:shadow-md">
                    <i class="fa fa-download mr-2"></i>
                    <span>导出成绩</span>
                </button>
                <button class="bg-white border border-gray-300 hover:bg-gray-50 text-dark px-4 py-2 rounded-lg transition-all duration-300 flex items-center shadow hover:shadow-md">
                    <i class="fa fa-refresh mr-2"></i>
                    <span>刷新数据</span>
                </button>
            </div>
        </div>

        <!-- 成绩表格 -->
        <div class="overflow-x-auto">
            <table class="min-w-full bg-white rounded-lg overflow-hidden">
                <thead>
                <tr class="bg-gray-50 text-left">
                    <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">课程编号</th>
                    <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">课程名称</th>
                    <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">学分</th>
                    <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">成绩</th>
                    <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">状态</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-gray-200">
                <!-- 使用th:if检查scores是否存在 -->
                <tr th:if="${scores == null || scores.isEmpty()}">
                    <td colspan="5" class="px-6 py-10 text-center text-gray-500">
                        <div class="flex flex-col items-center">
                            <i class="fa fa-file-text-o text-4xl mb-3 text-gray-300"></i>
                            <p>暂无成绩数据</p>
                        </div>
                    </td>
                </tr>
                <tr th:each="score : ${scores}" class="hover:bg-gray-50 transition-colors duration-200 hover-scale">
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                        <span class="font-medium" th:text="${score.cid}">课程编号</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                        <span class="font-medium" th:text="${score.name}">课程名称</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                        <span class="font-medium" th:text="${score.credit}">学分</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">
                        <span class="font-medium" th:text="${score.score}">成绩</span>
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap">
                                <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                      th:class="${score.score >= 60 ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}"
                                      th:text="${score.score >= 60 ? '及格' : '不及格'}">是否及格</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 返回按钮 -->
    <div class="text-center animate-fade-in">
        <form th:action="@{/index}" method="get" class="inline-block">
            <input type="hidden" name="sid" th:value="${sid}" />
            <button type="submit" class="bg-primary hover:bg-primary/90 text-white px-6 py-3 rounded-lg transition-all duration-300 flex items-center mx-auto shadow-md hover:shadow-lg">
                <i class="fa fa-arrow-left mr-2"></i>
                <span>返回首页</span>
            </button>
        </form>
    </div>
</main>

<!-- 页脚 -->
<footer class="bg-dark text-white py-8 mt-12">
    <div class="container mx-auto px-4">
        <div class="flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0">
                <div class="flex items-center space-x-2">
                    <i class="fa fa-graduation-cap text-primary text-2xl"></i>
                    <span class="text-xl font-bold">学生成绩系统</span>
                </div>
                <p class="text-gray-400 mt-2">为学生提供便捷的成绩查询服务</p>
            </div>
            <div class="flex space-x-6">
                <a href="#" class="text-gray-400 hover:text-white transition-colors duration-300">
                    <i class="fa fa-question-circle"></i>
                    <span class="ml-1">帮助中心</span>
                </a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors duration-300">
                    <i class="fa fa-envelope"></i>
                    <span class="ml-1">联系我们</span>
                </a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors duration-300">
                    <i class="fa fa-shield"></i>
                    <span class="ml-1">隐私政策</span>
                </a>
            </div>
        </div>
        <div class="border-t border-gray-700 mt-6 pt-6 text-center text-gray-400 text-sm">
            <p>© 2025 学生成绩系统. 保留所有权利.</p>
        </div>
    </div>
</footer>

<script>
    // 页面滚动时导航栏样式变化
    window.addEventListener('scroll', function() {
        const nav = document.querySelector('nav');
        if (window.scrollY > 10) {
            nav.classList.add('py-2', 'shadow-lg');
            nav.classList.remove('py-3', 'shadow-md');
        } else {
            nav.classList.add('py-3', 'shadow-md');
            nav.classList.remove('py-2', 'shadow-lg');
        }
    });
</script>
</body>
</html>

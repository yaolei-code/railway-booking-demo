<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统首页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#6366F1',
                        accent: '#8B5CF6',
                        neutral: '#F3F4F6',
                        dark: '#1F2937'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
            .hover-scale {
                transition: transform 0.3s ease;
            }
            .hover-scale:hover {
                transform: scale(1.02);
            }
            .animate-fade-in {
                animation: fadeIn 0.5s ease-in-out;
            }
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-50 min-h-screen font-sans">
<!-- 导航栏 -->
<nav class="bg-white shadow-md sticky top-0 z-50 transition-all duration-300">
    <div class="container mx-auto px-4 py-3 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fa fa-graduation-cap text-primary text-2xl"></i>
            <span class="text-xl font-bold text-dark">学生选课系统</span>
        </div>
        <div class="hidden md:flex items-center space-x-4">
            <span class="text-gray-600">欢迎回来，<span class="font-medium" th:text="${studentName}">学生</span></span>
            <div class="h-8 w-8 rounded-full bg-primary/10 flex items-center justify-center">
                <i class="fa fa-user text-primary"></i>
            </div>
        </div>
    </div>
</nav>

<!-- 主要内容区 -->
<main class="container mx-auto px-4 py-8">
    <!-- 标题区域 -->
    <div class="mb-10 text-center animate-fade-in">
        <h1 class="text-[clamp(1.8rem,3vw,2.5rem)] font-bold text-dark mb-3">高校学生选课管理系统</h1>
        <p class="text-dark font-medium mt-2 text-[clamp(1rem,2vw,1.2rem)]"
           th:text="'你好，' + ${studentName} + '同学，您当前所属：' + ${depName} + ' · ' + ${className}">欢迎语</p>
        <p class="text-gray-600 max-w-2xl mx-auto">
            欢迎使用学生选课管理系统，您可以通过此系统查看选课信息、成绩和登录记录
        </p>
    </div>

    <!-- 功能卡片 -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-4xl mx-auto">
        <!-- 查看我的选课 -->
        <form th:action="@{/myCourses}" method="get" class="animate-fade-in hover-scale" style="animation-delay: 0.1s">
            <input type="hidden" name="sid" th:value="${sid}" />
            <button type="submit" class="w-full bg-white rounded-lg shadow-md p-4 flex items-center text-left hover:shadow-lg transition-all duration-300 border-l-4 border-primary">
                <div class="h-10 w-10 rounded-lg bg-primary/10 flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa fa-book text-primary"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-dark">查看我的选课</h3>
                    <p class="text-sm text-gray-600">查看已选课程信息</p>
                </div>
            </button>
        </form>

        <!-- 进入课程列表 -->
        <form th:action="@{/coursesPage}" method="get" class="animate-fade-in hover-scale" style="animation-delay: 0.2s">
            <input type="hidden" name="sid" th:value="${sid}" />
            <button type="submit" class="w-full bg-white rounded-lg shadow-md p-4 flex items-center text-left hover:shadow-lg transition-all duration-300 border-l-4 border-secondary">
                <div class="h-10 w-10 rounded-lg bg-secondary/10 flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa fa-th-list text-secondary"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-dark">进入课程列表</h3>
                    <p class="text-sm text-gray-600">浏览并选择课程</p>
                </div>
            </button>
        </form>


        <!-- 查看我的成绩 -->
        <form th:action="@{/myScores}" method="get" class="animate-fade-in hover-scale" style="animation-delay: 0.2s">
            <input type="hidden" name="sid" th:value="${sid}" />
            <button type="submit" class="w-full bg-white rounded-lg shadow-md p-4 flex items-center text-left hover:shadow-lg transition-all duration-300 border-l-4 border-secondary">
                <div class="h-10 w-10 rounded-lg bg-secondary/10 flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa fa-graduation-cap text-secondary"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-dark">查看我的成绩</h3>
                    <p class="text-sm text-gray-600">查看课程成绩信息</p>
                </div>
            </button>
        </form>

        <!-- 查看我的登录记录 -->
        <form th:action="@{/myLogs}" method="get" class="animate-fade-in hover-scale" style="animation-delay: 0.3s">
            <input type="hidden" name="sid" th:value="${sid}" />
            <button type="submit" class="w-full bg-white rounded-lg shadow-md p-4 flex items-center text-left hover:shadow-lg transition-all duration-300 border-l-4 border-accent">
                <div class="h-10 w-10 rounded-lg bg-accent/10 flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa fa-history text-accent"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-dark">查看我的登录记录</h3>
                    <p class="text-sm text-gray-600">查看系统登录历史</p>
                </div>
            </button>
        </form>

        <!-- 查看课程与教师 -->
        <form th:action="@{/coursesWithTeacher}" method="get" class="animate-fade-in hover-scale" style="animation-delay: 0.4s">
            <input type="hidden" name="sid" th:value="${sid}" />
            <button type="submit" class="w-full bg-white rounded-lg shadow-md p-4 flex items-center text-left hover:shadow-lg transition-all duration-300 border-l-4 border-pink-400">
                <div class="h-10 w-10 rounded-lg bg-pink-100 flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa fa-chalkboard-teacher text-pink-500"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-dark">课程与教师</h3>
                    <p class="text-sm text-gray-600">查看所有课程及任课老师</p>
                </div>
            </button>
        </form>

        <!-- 查看我的奖惩记录 -->
        <form th:action="@{/myPunishments}" method="get" class="animate-fade-in hover-scale" style="animation-delay: 0.4s">
            <input type="hidden" name="sid" th:value="${sid}" />
            <button type="submit" class="w-full bg-white rounded-lg shadow-md p-4 flex items-center text-left hover:shadow-lg transition-all duration-300 border-l-4 border-yellow-500">
                <div class="h-10 w-10 rounded-lg bg-yellow-100 flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa fa-gavel text-yellow-600"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-dark">查看奖惩记录</h3>
                    <p class="text-sm text-gray-600">了解自己的奖惩情况</p>
                </div>
            </button>
        </form>

        <!-- 查看学期信息 -->
        <form th:action="@{/semesters}" method="get" class="animate-fade-in hover-scale" style="animation-delay: 0.4s">
            <input type="hidden" name="sid" th:value="${sid}" />
            <button type="submit" class="w-full bg-white rounded-lg shadow-md p-4 flex items-center text-left hover:shadow-lg transition-all duration-300 border-l-4 border-green-500">
                <div class="h-10 w-10 rounded-lg bg-green-100 flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa fa-calendar text-green-600"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-dark">查看学期信息</h3>
                    <p class="text-sm text-gray-600">浏览全部学年学期</p>
                </div>
            </button>
        </form>

        <form th:action="@{/totalCredit}" method="get" class="animate-fade-in hover-scale" style="animation-delay: 0.4s">
            <input type="hidden" name="sid" th:value="${sid}" />
            <input type="hidden" name="semester" value="2023-2024-2" />
            <button type="submit" class="w-full bg-white rounded-lg shadow-md p-4 flex items-center text-left hover:shadow-lg transition-all duration-300 border-l-4 border-indigo-500">
                <div class="h-10 w-10 rounded-lg bg-indigo-100 flex items-center justify-center mr-4 flex-shrink-0">
                    <i class="fa fa-bar-chart text-indigo-500"></i>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-dark">统计我的总学分</h3>
                    <p class="text-sm text-gray-600">查看某学期的学分总和</p>
                </div>
            </button>
        </form>


    </div>


    <!-- 快速提示 -->
    <div class="mt-10 bg-blue-50 border-l-4 border-primary p-4 rounded-lg max-w-3xl mx-auto animate-fade-in" style="animation-delay: 0.4s">
        <div class="flex">
            <div class="flex-shrink-0">
                <i class="fa fa-info-circle text-primary"></i>
            </div>
            <div class="ml-3">
                <h3 class="text-sm font-medium text-dark">系统提示</h3>
                <div class="mt-1 text-sm text-gray-600">
                    <p>本学期选课时间：2025年6月15日至2025年6月25日</p>
                    <p class="mt-1">成绩查询开放时间：课程结束后两周</p>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- 页脚 -->
<footer class="bg-dark text-white py-6 mt-10">
    <div class="container mx-auto px-4">
        <div class="flex flex-col md:flex-row justify-between items-center">
            <div class="mb-4 md:mb-0">
                <div class="flex items-center space-x-2">
                    <i class="fa fa-graduation-cap text-primary text-xl"></i>
                    <span class="text-lg font-bold">学生选课系统</span>
                </div>
                <p class="text-gray-400 mt-1 text-sm">为学生提供便捷的选课和成绩查询服务</p>
            </div>
            <div class="flex space-x-4">
                <a href="#" class="text-gray-400 hover:text-white transition-colors duration-300 text-sm">
                    <i class="fa fa-question-circle"></i>
                    <span class="ml-1">帮助</span>
                </a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors duration-300 text-sm">
                    <i class="fa fa-envelope"></i>
                    <span class="ml-1">联系</span>
                </a>
                <a href="#" class="text-gray-400 hover:text-white transition-colors duration-300 text-sm">
                    <i class="fa fa-shield"></i>
                    <span class="ml-1">隐私</span>
                </a>
            </div>
        </div>
        <div class="border-t border-gray-700 mt-4 pt-4 text-center text-gray-400 text-xs">
            <p>© 2025 高校学生选课管理系统. 保留所有权利.</p>
        </div>
    </div>
</footer>

<script>
    // 页面滚动时导航栏样式变化
    window.addEventListener('scroll', function() {
        const nav = document.querySelector('nav');
        if (window.scrollY > 10) {
            nav.classList.add('py-2', 'shadow-lg');
            nav.classList.remove('py-3', 'shadow-md');
        } else {
            nav.classList.add('py-3', 'shadow-md');
            nav.classList.remove('py-2', 'shadow-lg');
        }
    });
</script>
</body>
</html>

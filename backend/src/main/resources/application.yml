server:
  port: 8080

spring:
  application:
    name: railway-booking-backend
  datasource:
    url: jdbc:mysql://localhost:3306/railway_booking?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-me-please-32bytes}
    expiration-minutes: 120
